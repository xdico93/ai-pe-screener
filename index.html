<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI PE筛选器</title>
<style>
:root {
  --bg: #f5f5f7;
  --card: rgba(255,255,255,0.88);
  --text: #1d1d1f;
  --sub: #86868b;
  --border: rgba(0,0,0,0.06);
  --primary: #0071e3;
  --accent: #5e5ce6;
  --green: #34c759;
  --blue: #007aff;
  --amber: #ff9500;
  --red: #ff3b30;
  --radius: 16px;
  --radius-sm: 12px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.1);
  --safe-bottom: env(safe-area-inset-bottom, 16px);
  --safe-top: env(safe-area-inset-top, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg); color: var(--text); line-height:1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  max-width: 480px; margin:0 auto; min-height: 100vh;
  padding-bottom: calc(72px + var(--safe-bottom));
}

/* ── Header (macOS frosted) ── */
.header {
  position: sticky; top:0; z-index:100;
  background: rgba(29,29,31,0.92);
  backdrop-filter: saturate(180%) blur(25px);
  -webkit-backdrop-filter: saturate(180%) blur(25px);
  color:#fff; padding:12px 16px;
  padding-top: max(12px, var(--safe-top));
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.header-row { display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:17px; font-weight:700; letter-spacing:-0.02em; }
.header .sub { font-size:11px; opacity:.65; margin-top:1px; font-weight:400; }
.header .uptime { font-size:10px; opacity:.5; margin-top:1px; }
.header .actions { display:flex; gap:8px; }
.btn-icon {
  width:32px; height:32px; border-radius:50%; border:none;
  background:rgba(255,255,255,.12); color:#fff; font-size:15px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition: background .2s;
}
.btn-icon:active { background:rgba(255,255,255,.22); }

/* ── Sector Filter Panel ── */
.sector-panel { padding:10px 16px; }
.sector-hot {
  display:flex; flex-wrap:wrap; gap:6px;
  max-height: 96px; overflow:hidden; transition:max-height .4s ease;
}
.sector-hot.expanded { max-height:2000px; }
.sector-chip {
  padding:4px 12px; border-radius:16px; font-size:11px; font-weight:500;
  border:1px solid var(--border); background:var(--card);
  cursor:pointer; transition:all .2s; white-space:nowrap;
  box-shadow: var(--shadow-sm);
}
.sector-chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.sector-chip.ai {
  border-color: rgba(255,149,0,0.3);
  background: linear-gradient(135deg, rgba(255,149,0,0.08), rgba(255,59,48,0.04));
  color: #cc7a00;
}
.sector-chip.ai.active {
  background: linear-gradient(135deg, #ff9500, #ff3b30); color:#fff; border-color:transparent;
}
.sector-chip.ai::after { content:" ★"; font-size:9px; opacity:.7; }
.sector-expand {
  margin-top:8px; font-size:11px; color:var(--primary); cursor:pointer;
  display:flex; align-items:center; gap:4px; font-weight:500;
}
.sector-expand:hover { text-decoration:underline; }
/* Sector full list modal */
.sector-full {
  display:none; padding:0 16px 16px;
}
.sector-full.show { display:block; }
.sector-search {
  width:100%; padding:8px 12px; border:1px solid var(--border);
  border-radius:12px; font-size:13px; background:rgba(255,255,255,0.7);
  outline:none; color:var(--text); margin-bottom:8px;
}
.sector-search:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(0,113,227,0.12); }
.sector-list { max-height:260px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.sector-item {
  display:flex; align-items:center; padding:8px 0; font-size:13px;
  border-bottom:1px solid rgba(0,0,0,0.03); cursor:pointer;
}
.sector-item .cb {
  width:18px; height:18px; border-radius:5px; border:1.5px solid var(--border);
  margin-right:10px; flex-shrink:0; display:flex; align-items:center;
  justify-content:center; transition:all .2s; font-size:11px; color:#fff;
}
.sector-item .cb.on { background:var(--primary); border-color:var(--primary); }
.sector-item .name { flex:1; font-weight:450; }
.sector-item .count { font-size:11px; color:var(--sub); margin-left:6px; }
.sector-item .ai-badge {
  font-size:9px; background: linear-gradient(135deg, #ff9500, #ff3b30);
  color:#fff; padding:1px 5px; border-radius:6px; margin-left:6px;
}
.sector-pager { display:flex; gap:8px; margin-top:8px; justify-content:center; }
.sector-pager button {
  padding:4px 12px; border-radius:10px; border:1px solid var(--border);
  background:var(--card); font-size:12px; cursor:pointer;
}
.sector-pager button:disabled { opacity:.4; cursor:not-allowed; }
.sector-actions { display:flex; gap:8px; margin-bottom:8px; }
.sector-actions button {
  font-size:11px; padding:3px 10px; border-radius:10px;
  border:1px solid var(--border); background:transparent; color:var(--sub); cursor:pointer;
}

/* ── PE Ratio Control ── */
.ratio-ctrl { padding:6px 16px 10px; }
.ratio-label { font-size:11px; color:var(--sub); margin-bottom:6px; font-weight:500; }
.ratio-presets { display:flex; gap:6px; flex-wrap:wrap; }
.ratio-preset {
  padding:5px 14px; border-radius:18px; font-size:12px; font-weight:600;
  border:1px solid var(--border); background:var(--card); cursor:pointer;
  transition:all .2s; box-shadow:var(--shadow-sm);
}
.ratio-preset.on { background:var(--primary); color:#fff; border-color:var(--primary); }
.ratio-custom {
  width:70px; padding:5px 10px; border-radius:18px; font-size:12px; font-weight:600;
  border:1px solid var(--border); background:var(--card); outline:none;
  text-align:center; color:var(--text);
}
.ratio-custom:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(0,113,227,0.12); }
.ratio-stats {
  margin-top: 10px; padding: 8px 14px; background: linear-gradient(135deg, rgba(0,113,227,0.06), rgba(94,92,230,0.04));
  border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--primary);
  text-align: center; transition: all 0.25s ease;
}

/* ── Search ── */
.search-wrap { padding:0 16px 8px; }
.search-box {
  display:flex; align-items:center; background:var(--card);
  border-radius:20px; padding:10px 16px; gap:8px;
  box-shadow:var(--shadow-sm);
}
.search-box input {
  flex:1; border:none; outline:none; font-size:14px; background:transparent; color:var(--text);
}
.search-box input::placeholder { color:#b0b0b8; }

/* ── Filter Chips ── */
.filter-wrap { padding:8px 16px 6px; display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.filter-chip {
  flex-shrink:0; padding:5px 14px; border-radius:18px; font-size:11px; font-weight:500;
  border:1px solid var(--border); background:var(--card); cursor:pointer;
  transition:all .2s; box-shadow:var(--shadow-sm);
}
.filter-chip.on { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ── Card List ── */
.list { padding:0 12px; }
.card {
  background:var(--card); border-radius:var(--radius); margin-bottom:8px;
  padding:14px 16px; box-shadow:var(--shadow-sm);
  cursor:pointer; transition:all .2s cubic-bezier(.25,.1,.25,1);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border:1px solid rgba(0,0,0,0.04);
}
.card:active { transform:scale(.985); box-shadow:var(--shadow-md); }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.card-code { font-size:12px; color:var(--sub); font-weight:500; }
.card-name { font-size:16px; font-weight:700; letter-spacing:-0.01em; }
.card-right { text-align:right; }
.card-ratio { font-size:20px; font-weight:800; letter-spacing:-0.03em; }
.ratio-high { color:var(--green); }
.ratio-mid { color:var(--blue); }
.ratio-low { color:var(--amber); }
.serenity-badge {
  display:inline-flex; align-items:center; gap:3px;
  font-size:10px; padding:2px 7px; border-radius:10px; margin-top:3px;
  font-weight:600;
}
.serenity-top { background:#dcf5e6; color:#1a7a3a; }
.serenity-high { background:#dbeafe; color:#1e5ac4; }
.serenity-track { background:#fff3e0; color:#b87600; }
.card-metrics {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;
  padding:10px 0; border-top:1px solid rgba(0,0,0,0.04);
  border-bottom:1px solid rgba(0,0,0,0.04);
}
.metric-label { font-size:10px; color:var(--sub); margin-bottom:2px; }
.metric-value { font-size:14px; font-weight:600; }
.card-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.tag {
  font-size:10px; padding:2px 8px; border-radius:10px;
  background:rgba(0,113,227,0.08); color:var(--primary); white-space:nowrap;
  font-weight:500;
}
.tag-ai {
  background: linear-gradient(135deg, rgba(255,149,0,0.12), rgba(255,59,48,0.06));
  color:#cc5500; font-weight:600;
}

/* ── Loading ── */
.loading { text-align:center; padding:60px 20px; color:var(--sub); }
.spinner {
  width:32px; height:32px; border:3px solid rgba(0,0,0,0.06);
  border-top-color:var(--primary); border-radius:50%;
  animation:spin .7s linear infinite; margin:0 auto 16px;
}
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes pulse { 0% { opacity:0.5; transform:scale(0.98); } 50% { opacity:1; transform:scale(1.02); } 100% { opacity:1; transform:scale(1); } }

/* ── Empty ── */
.empty { text-align:center; padding:60px 20px; color:var(--sub); }
.empty .icon { font-size:40px; margin-bottom:10px; opacity:.7; }

/* ── Detail Sheet ── */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:200;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.overlay.show { opacity:1; pointer-events:auto; }
.sheet {
  background:rgba(255,255,255,0.97);
  backdrop-filter: saturate(180%) blur(30px);
  -webkit-backdrop-filter: saturate(180%) blur(30px);
  border-radius:20px 20px 0 0; width:100%; max-width:480px;
  max-height:85vh; overflow-y:auto; padding:20px;
  padding-bottom:calc(20px + var(--safe-bottom));
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.25,.1,.25,1);
  box-shadow:0 -4px 30px rgba(0,0,0,0.1);
}
.overlay.show .sheet { transform:translateY(0); }
.sheet-handle { width:32px; height:4px; background:#d2d2d7; border-radius:2px; margin:0 auto 14px; }
.sheet-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.sheet-title { font-size:20px; font-weight:700; letter-spacing:-0.02em; }
.sheet-code { font-size:13px; color:var(--sub); }
.sheet-close {
  font-size:22px; background:none; border:none; cursor:pointer;
  color:var(--sub); padding:4px; width:32px; height:32px;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
}
.sheet-close:active { background:rgba(0,0,0,0.06); }
.sheet-ratio { font-size:36px; font-weight:800; margin:12px 0; letter-spacing:-0.03em; }
.sheet-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0; }
.sheet-item {
  background:rgba(0,0,0,0.02); border-radius:var(--radius-sm);
  padding:12px; border:1px solid rgba(0,0,0,0.03);
}
.sheet-item .l { font-size:10px; color:var(--sub); font-weight:500; }
.sheet-item .v { font-size:17px; font-weight:700; margin-top:3px; }
/* Serenity section in sheet */
.serenity-section {
  margin-top:16px; padding:16px; border-radius:var(--radius-sm);
  background:rgba(0,0,0,0.015); border:1px solid rgba(0,0,0,0.04);
}
.serenity-section h4 {
  font-size:13px; font-weight:700; margin-bottom:10px;
  display:flex; align-items:center; gap:6px;
}
.serenity-score-bar {
  height:6px; border-radius:3px; background:rgba(0,0,0,0.06); overflow:hidden; margin-bottom:8px;
}
.serenity-score-fill {
  height:100%; border-radius:3px; transition:width .6s ease;
  background: linear-gradient(90deg, #ff3b30, #ff9500, #ffcc00, #34c759, #007aff);
}
.serenity-score-num { font-size:22px; font-weight:800; display:inline; margin-right:6px; }
.serenity-verdict { font-size:12px; display:inline; font-weight:600; }
.serenity-summary { font-size:12px; color:var(--sub); margin-top:8px; line-height:1.6; }
.serenity-flags { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.serenity-flag {
  font-size:10px; padding:2px 8px; border-radius:10px;
  background:rgba(255,59,48,0.08); color:var(--red); font-weight:500;
}

/* ── Toast ── */
.toast {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(0,0,0,.82); color:#fff; padding:10px 22px;
  border-radius:22px; font-size:13px; z-index:999;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  opacity:0; pointer-events:none; transition:opacity .25s;
  white-space:pre-line; text-align:center;
}
.toast.show { opacity:1; }

/* ── Footer ── */
.footer-bar {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  background:rgba(255,255,255,0.92);
  backdrop-filter: saturate(180%) blur(25px);
  -webkit-backdrop-filter: saturate(180%) blur(25px);
  border-top:1px solid rgba(0,0,0,0.06);
  display:flex; padding:8px 16px;
  padding-bottom:calc(8px + var(--safe-bottom)); gap:10px; z-index:100;
}
.footer-btn {
  flex:1; padding:10px; border:none; border-radius:20px;
  font-size:13px; font-weight:600; cursor:pointer; transition:all .2s;
  letter-spacing:-0.01em;
}
.footer-btn:active { transform:scale(.97); }
.footer-btn:disabled { opacity:.45; cursor:not-allowed; transform:none; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-outline {
  background:transparent; color:var(--primary);
  border:1.5px solid rgba(0,113,227,0.3);
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-row">
    <div>
      <h1>AI PE Screener</h1>
      <div class="sub">PE(TTM) / 动态PE 筛选</div>
      <div class="uptime" id="updateTime">加载中...</div>
    </div>
    <div class="actions">
      <button class="btn-icon" onclick="shareApp()" title="分享">&#8599;</button>
    </div>
  </div>
</div>

<!-- Sector Filter Panel -->
<div class="sector-panel" id="sectorPanel">
  <div class="sector-hot" id="sectorHot"></div>
  <div class="sector-expand" id="sectorExpand" onclick="toggleSectorFull()" style="display:none">
    <span id="sectorExpandIcon">&#9660;</span> <span id="sectorExpandText">展开全部板块</span>
  </div>
  <div class="sector-full" id="sectorFull">
    <div class="sector-actions">
      <button onclick="selectAllSectors()">全选</button>
      <button onclick="clearSectors()">清空</button>
    </div>
    <input class="sector-search" id="sectorSearch" placeholder="搜索板块..." oninput="renderSectorList()">
    <div class="sector-list" id="sectorList"></div>
    <div class="sector-pager" id="sectorPager"></div>
  </div>
  <!-- Selected sector chips -->
  <div id="selectedSectorChips" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
</div>

<!-- PE Ratio Control -->
<div class="ratio-ctrl">
  <div class="ratio-label">PE(TTM) / 动态PE 最低比值</div>
  <div class="ratio-presets">
    <span class="ratio-preset on" data-ratio="0.8" onclick="setMinRatio(this,0.8)">0.8</span>
    <span class="ratio-preset" data-ratio="1.0" onclick="setMinRatio(this,1.0)">1.0</span>
    <span class="ratio-preset" data-ratio="1.5" onclick="setMinRatio(this,1.5)">1.5</span>
    <span class="ratio-preset" data-ratio="2.0" onclick="setMinRatio(this,2.0)">2.0</span>
    <span class="ratio-preset" data-ratio="3.0" onclick="setMinRatio(this,3.0)">3.0</span>
    <input class="ratio-custom" id="ratioCustom" placeholder="自定义" oninput="onCustomRatio()" type="text" inputmode="decimal">
  </div>
  <div id="ratioStats" class="ratio-stats">已加载 0 只标的</div>
</div>

<!-- Search -->
<div class="search-wrap">
  <div class="search-box">
    <span style="font-size:14px;opacity:.5">&#128269;</span>
    <input type="text" id="searchInput" placeholder="搜索代码或名称..." oninput="doSearch()">
    <span id="searchCount" style="font-size:12px;color:var(--sub);display:none"></span>
  </div>
</div>

<!-- Filter Chips -->
<div class="filter-wrap" id="filterWrap"></div>

<!-- Card List -->
<div class="list" id="cardList"></div>

<!-- Loading -->
<div class="loading" id="loadingView">
  <div class="spinner"></div>
  <div>正在加载数据...</div>
</div>

<!-- Empty -->
<div class="empty" id="emptyState" style="display:none">
  <div class="icon">&#128123;</div>
  <div id="emptyMsg">没有符合条件的标的</div>
</div>

<!-- Sheet -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Footer -->
<div class="footer-bar">
  <button class="footer-btn btn-outline" onclick="exportData()">导出 CSV</button>
  <button class="footer-btn btn-primary" id="btnRefresh" onclick="loadData(true)">更新数据</button>
</div>

<script>
// ════════════════════ DATA LOADER ════════════════════
// 双数据源: 优先实时后端API, 降级到GitHub Pages静态数据
const BACKEND_URL = 'https://ai-pe-screener.onrender.com/api/data';  // Render.com 全市场实时PE后端
const FALLBACK_URL = 'https://xdico93.github.io/ai-pe-screener/data.json';
const CACHE_KEY = 'aipescreener_data_v5';

let STOCK_DATA = [];
let META = null;           // {allSectors, aiSectors, hotSectors, ...}
let ALL_SECTORS = [];      // full sector list with counts

async function loadData(forceRefresh) {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true; btn.textContent = '更新中...';

  const isFirstLoad = !STOCK_DATA.length;
  if (isFirstLoad) {
    document.getElementById('loadingView').style.display = 'block';
    document.getElementById('cardList').innerHTML = '';
  }

  try {
    // 优先尝试实时后端API，降级到静态data.json
    const urls = forceRefresh
      ? [`${BACKEND_URL}?t=${Date.now()}`, `${FALLBACK_URL}?t=${Date.now()}`]
      : [BACKEND_URL, FALLBACK_URL];

    if (forceRefresh) { localStorage.removeItem(CACHE_KEY); }

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), forceRefresh ? 90000 : 60000);

    let json = null;
    let sourceLabel = '';
    for (const url of urls) {
      try {
        const resp = await fetch(url, {
          cache: forceRefresh ? 'no-cache' : 'default',
          signal: ctrl.signal,
        });
        if (!resp.ok) continue;
        const candidate = await resp.json();
        if (candidate.data && Array.isArray(candidate.data)) {
          json = candidate;
          sourceLabel = url.includes('localhost') || url.includes('onrender.com') || url.includes('render.com') ? ' · 实时' : '';
          break;
        }
      } catch(e) { continue; }
    }
    clearTimeout(timer);

    if (!json) throw new Error('All data sources failed');

    STOCK_DATA = json.data;
    META = json.meta || {};

    // 浏览器端实时计算 Serenity 评分（6ms/111只）
    try { Serenity.scoreAll(STOCK_DATA); } catch(e) { console.warn('Serenity:', e); }
    initSectors();

    try { localStorage.setItem(CACHE_KEY, JSON.stringify(json)); } catch(e) {}

    document.getElementById('loadingView').style.display = 'none';
    const upStr = json.updated ? '上次更新: ' + json.updated : '最新数据';
    const filteredCount = filterData().length;
    document.getElementById('updateTime').textContent = upStr + ' · ' + filteredCount + '只' + sourceLabel;
    btn.textContent = forceRefresh ? '已更新' : '更新数据';

    if (isFirstLoad) {
      minRatio = META.baselineRatio || 0.8;
      selectedSectors = new Set();
      activeSectorPage = 0;
    }
    resetRatioUI();
    render();
  } catch(err) {
    console.error('Load failed:', err);
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      try {
        const json = JSON.parse(cached);
        STOCK_DATA = json.data; META = json.meta || {};
        try { Serenity.scoreAll(STOCK_DATA); } catch(e) {}
        initSectors();
        document.getElementById('loadingView').style.display = 'none';
        document.getElementById('updateTime').textContent = '缓存 · 离线模式';
        toast('使用本地缓存');
        render();
      } catch(e2) { showEmpty('数据加载失败，请检查网络'); }
    } else { showEmpty('数据加载失败，请检查网络'); }
    btn.textContent = '重试';
  } finally {
    btn.disabled = false;
    if (btn.textContent === '已更新') {
      setTimeout(() => { btn.textContent = '更新数据'; }, 3000);
    } else if (btn.textContent === '更新中...') {
      btn.textContent = '重试';
    }
  }
}

function initSectors() {
  // Build sector list with counts from STOCK_DATA
  const counter = {};
  STOCK_DATA.forEach(s => {
    (s.sectors||[]).forEach(sec => { counter[sec] = (counter[sec]||0) + 1; });
  });
  ALL_SECTORS = Object.entries(counter)
    .sort((a,b) => b[1] - a[1])
    .map(([name,count]) => ({name, count, isAi: isAiSector(name)}));
}

function isAiSector(name) {
  // 覆盖全部18个AI产业链板块（算力AI + 物理AI）
  const aiKw = [
    // 算力AI板块 (原10个)
    'cpo','CPO','光通信','存储芯片','液冷','算力','pcb','PCB',
    '铜缆连接','先进封装','热管理','数据中心','华为算力','东数西算',
    // 物理AI板块 (新增8个)
    '智能机器','人形机器人','机器人','机器视觉','视觉',
    '减速器','传感器','工业母机','激光雷达','毫米波雷达','雷达',
    // 通用关键词
    'ai','人工智能','芯片','半导体','光模块','hbm','硅光','服务器','gpu'
  ];
  const nl = name.toLowerCase();
  return aiKw.some(k => nl.includes(k.toLowerCase()));
}

function showEmpty(msg) {
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('emptyState').style.display = 'block';
  document.getElementById('emptyMsg').textContent = msg;
  document.getElementById('updateTime').textContent = '连接失败';
}

// ════════════════════ STATE ════════════════════
let minRatio = 0.8;
let selectedSectors = new Set();
let searchQuery = '';
let searchTimer = null;
let sortKey = 'ratio';
let sortAsc = false;
let sectorFullOpen = false;
let activeSectorPage = 0;
const SECTOR_PAGE_SIZE = 20;

// ════════════════════ SECTOR FILTER ════════════════════
function toggleSectorFull() {
  sectorFullOpen = !sectorFullOpen;
  document.getElementById('sectorFull').classList.toggle('show', sectorFullOpen);
  document.getElementById('sectorExpandIcon').textContent = sectorFullOpen ? '\u25B2' : '\u25BC';
  document.getElementById('sectorExpandText').textContent = sectorFullOpen ? '收起' : '展开全部板块';
  if (sectorFullOpen) renderSectorList();
}

function renderSectorList() {
  if (!sectorFullOpen) return;
  const q = (document.getElementById('sectorSearch').value||'').toLowerCase();
  let filtered = ALL_SECTORS;
  if (q) filtered = filtered.filter(s => s.name.toLowerCase().includes(q));

  const totalPages = Math.ceil(filtered.length / SECTOR_PAGE_SIZE);
  const start = activeSectorPage * SECTOR_PAGE_SIZE;
  const page = filtered.slice(start, start + SECTOR_PAGE_SIZE);

  document.getElementById('sectorList').innerHTML = page.map(s => `
    <div class="sector-item" onclick="toggleSector('${s.name.replace(/'/g,"\\'")}')">
      <div class="cb${selectedSectors.has(s.name)?' on':''}">${selectedSectors.has(s.name)?'&#10003;':''}</div>
      <span class="name">${s.name}</span>
      ${s.isAi?'<span class="ai-badge">AI</span>':''}
      <span class="count">${s.count}</span>
    </div>
  `).join('');

  // Pagination
  let pagerHTML = '';
  if (totalPages > 1) {
    pagerHTML += `<button onclick="goSectorPage(${activeSectorPage-1})" ${activeSectorPage===0?'disabled':''}>上页</button>`;
    pagerHTML += `<span style="font-size:12px;color:var(--sub);line-height:28px">${activeSectorPage+1}/${totalPages}</span>`;
    pagerHTML += `<button onclick="goSectorPage(${activeSectorPage+1})" ${activeSectorPage>=totalPages-1?'disabled':''}>下页</button>`;
  }
  document.getElementById('sectorPager').innerHTML = pagerHTML;
}

function goSectorPage(n) { activeSectorPage = n; renderSectorList(); }

function toggleSector(name) {
  if (selectedSectors.has(name)) selectedSectors.delete(name);
  else selectedSectors.add(name);
  renderSectorList();
  renderSelectedChips();
  render();
}

function selectAllSectors() {
  ALL_SECTORS.forEach(s => selectedSectors.add(s.name));
  renderSectorList(); renderSelectedChips(); render();
}

function clearSectors() {
  selectedSectors.clear();
  renderSectorList(); renderSelectedChips(); render();
}

function removeSector(name) {
  selectedSectors.delete(name);
  renderSectorList(); renderSelectedChips(); render();
}

function renderSelectedChips() {
  if (selectedSectors.size === 0) {
    document.getElementById('selectedSectorChips').innerHTML = '';
    return;
  }
  document.getElementById('selectedSectorChips').innerHTML =
    Array.from(selectedSectors).slice(0,15).map(name =>
      `<span class="tag" style="cursor:pointer" onclick="removeSector('${name.replace(/'/g,"\\'")}')">${name} &times;</span>`
    ).join('') + (selectedSectors.size > 15 ? `<span class="tag">+${selectedSectors.size-15}更多</span>` : '');
}

function renderHotSectors() {
  const hot = META.aiSectors || META.hotSectors || ALL_SECTORS.slice(0,30).map(s=>s.name);
  const totalCount = STOCK_DATA.length;
  const totalHtml = `<span class="sector-chip${selectedSectors.size===0?' active':''}" onclick="clearSectors()">全部 ${totalCount}</span>`;

  const chips = hot.map(name => {
    const cnt = ALL_SECTORS.find(s=>s.name===name)?.count || 0;
    if (cnt === 0) return '';
    const isAi = isAiSector(name);
    const active = selectedSectors.size > 0 && !selectedSectors.has(name) ? '' : 
                   (selectedSectors.has(name) ? ' active' : '');
    const aiClass = isAi ? ' ai' : '';
    return `<span class="sector-chip${active}${aiClass}" onclick="event.stopPropagation();quickToggleSector('${name.replace(/'/g,"\\'")}')">${name} ${cnt}</span>`;
  }).filter(Boolean).join('');

  document.getElementById('sectorHot').innerHTML = totalHtml + chips;
  document.getElementById('sectorExpand').style.display = hot.length > 10 ? 'flex' : 'none';
}

function quickToggleSector(name) {
  if (selectedSectors.has(name)) selectedSectors.delete(name);
  else { selectedSectors.clear(); selectedSectors.add(name); }
  renderSelectedChips(); render();
}

// ════════════════════ PE RATIO CONTROL ════════════════════
function updateCounts(filteredData) {
  const filtered = filteredData ? filteredData.length : filterData().length;
  // Ratio stats bar below presets
  const ratioStats = document.getElementById('ratioStats');
  if (ratioStats) {
    ratioStats.textContent = `PE ≥ ${minRatio}  共 ${filtered.toLocaleString()} 只标的`;
    ratioStats.style.color = filtered === 0 ? 'var(--red)' : 'var(--primary)';
    ratioStats.style.animation = 'none';
    void ratioStats.offsetWidth; // trigger reflow
    ratioStats.style.animation = 'pulse 0.3s ease';
  }
  // Update search count
  if (searchQuery) {
    document.getElementById('searchCount').style.display = 'inline';
    document.getElementById('searchCount').textContent = `${filtered}条`;
  }
}

function setMinRatio(el, val) {
  minRatio = val;
  document.getElementById('ratioCustom').value = '';
  document.querySelectorAll('.ratio-preset').forEach(p => p.classList.toggle('on', p.dataset.ratio == val));
  render();
}

function onCustomRatio() {
  const input = document.getElementById('ratioCustom');
  const v = parseFloat(input.value);
  if (!isNaN(v) && v >= 0.1) {
    minRatio = v;
    document.querySelectorAll('.ratio-preset').forEach(p => p.classList.remove('on'));
  } else if (!isNaN(v) && v > 0 && v < 0.1) {
    minRatio = 0.1;
  }
  render();  // 始终触发实时刷新
}

function resetRatioUI() {
  document.querySelectorAll('.ratio-preset').forEach(p => {
    if (parseFloat(p.dataset.ratio) === minRatio) p.classList.add('on');
    else p.classList.remove('on');
  });
}

// ════════════════════ RENDER ════════════════════
function filterData() {
  if (!STOCK_DATA.length) return [];
  return STOCK_DATA.filter(s => {
    // PE ratio filter
    if (s.ratio < minRatio) return false;
    // Sector filter (OR logic)
    if (selectedSectors.size > 0) {
      const stockSectors = s.sectors || [];
      if (!stockSectors.some(sec => selectedSectors.has(sec))) return false;
    }
    // Search
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const code = String(s.code || '');
      const name = (s.name || '').toLowerCase();
      if (!code.includes(q) && !name.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => {
    const va = a[sortKey], vb = b[sortKey];
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });
}

function ratioClass(r) {
  if (r >= 5) return 'ratio-high';
  if (r >= 2) return 'ratio-mid';
  return 'ratio-low';
}

function formatPE(v) {
  if (v >= 1000) return (v/1000).toFixed(1)+'k';
  return v.toFixed(1);
}

function serenityClass(score) {
  if (!score && score !== 0) return '';
  if (score >= 85) return 'serenity-top';
  if (score >= 70) return 'serenity-high';
  if (score >= 55) return 'serenity-track';
  return '';
}

function serenityLabel(score) {
  if (!score && score !== 0) return '';
  if (score >= 85) return 'Top';
  if (score >= 70) return 'High';
  if (score >= 55) return 'Track';
  return '';
}

function render() {
  const data = filterData();

  // Update all count displays
  updateCounts(data);

  // Update header time count to reflect current filter
  const timeEl = document.getElementById('updateTime');
  if (timeEl) {
    const txt = timeEl.textContent;
    timeEl.textContent = txt.replace(/ \d+只/, ` ${data.length}只`);
  }

  // Hot sectors
  renderHotSectors();

  // Filter chips
  let fHTML = `<span class="filter-chip${sortKey==='ratio'?' on':''}" onclick="setSort('ratio')">比值</span>`;
  fHTML += `<span class="filter-chip${sortKey==='peTTM'?' on':''}" onclick="setSort('peTTM')">PE(TTM)</span>`;
  fHTML += `<span class="filter-chip${sortKey==='peDyn'?' on':''}" onclick="setSort('peDyn')">动态PE</span>`;
  fHTML += `<span class="filter-chip${sortKey==='code'?' on':''}" onclick="setSort('code')">代码</span>`;
  document.getElementById('filterWrap').innerHTML = fHTML;

  // Cards
  if (data.length === 0) {
    document.getElementById('cardList').innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    if (searchQuery) {
      document.getElementById('emptyMsg').textContent = `未找到包含「${searchQuery}」的标的`;
    } else if (minRatio > (META?.baselineRatio||0.8)) {
      document.getElementById('emptyMsg').textContent = `PE比值 >= ${minRatio} 的标的为0，尝试降低阈值`;
    } else {
      document.getElementById('emptyMsg').textContent = '没有符合条件的标的';
    }
  } else {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('cardList').innerHTML = data.map(s => {
      const ser = s.serenity;
      const serCls = serenityClass(ser?.score);
      const serLbl = serenityLabel(ser?.score);
      const aiCls = s.isAiConcept ? ' tag-ai' : '';
      const ratioCls = ratioClass(s.ratio);
      return `
      <div class="card" onclick="openDetail('${s.code}')">
        <div class="card-top">
          <div>
            <div class="card-code">${s.code}</div>
            <div class="card-name">${s.name}</div>
          </div>
          <div class="card-right">
            <div class="card-ratio ${ratioCls}">${s.ratio.toFixed(1)}x</div>
            ${serCls ? `<div class="serenity-badge ${serCls}">${serLbl} ${ser.score}</div>` : ''}
          </div>
        </div>
        <div class="card-metrics">
          <div><div class="metric-label">现价</div><div class="metric-value">¥${s.price}</div></div>
          <div><div class="metric-label">PE(TTM)</div><div class="metric-value">${formatPE(s.peTTM)}</div></div>
          <div><div class="metric-label">动态PE</div><div class="metric-value">${formatPE(s.peDyn)}</div></div>
        </div>
        <div class="card-tags">${(s.sectors||[]).slice(0,4).map(b =>
          `<span class="tag${isAiSector(b)?' tag-ai':''}">${b}</span>`
        ).join('')}${(s.sectors||[]).length > 4 ? `<span class="tag">+${s.sectors.length-4}</span>` : ''}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('searchCount').style.display = searchQuery ? 'inline' : 'none';
  if (searchQuery) document.getElementById('searchCount').textContent = `${data.length}条`;

  // Update ratio preset highlighting
  resetRatioUI();
}

function setSort(k) {
  if (sortKey === k) { sortAsc = !sortAsc; } else { sortKey = k; sortAsc = (k==='code'); }
  render();
}
function doSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = document.getElementById('searchInput').value.trim();
    render();
  }, 150);
}

// ════════════════════ DETAIL SHEET ════════════════════
function openDetail(code) {
  const s = STOCK_DATA.find(x => x.code === code);
  if (!s) return;
  const cls = ratioClass(s.ratio);
  const ser = s.serenity;
  let serenityHTML = '';
  if (ser) {
    const sc = serenityClass(ser.score);
    const sl = serenityLabel(ser.score);
    const scColor = ser.score >= 85 ? '#34c759' : ser.score >= 70 ? '#007aff' : ser.score >= 55 ? '#ff9500' : '#ff3b30';

    // Dimensions bars
    let dimsHTML = '';
    const dimNames = {
      demand_inflection:'需求拐点',chokepoint_severity:'瓶颈稀缺',evidence_quality:'证据质量',
      supplier_concentration:'供应商集中',expansion_difficulty:'扩产难度',valuation_disconnect:'估值偏离',
      architecture_coupling:'架构耦合',catalyst_timing:'催化剂时机'
    };
    const penNames = {
      dilution_financing:'稀释融资',governance:'公司治理',geopolitics:'地缘政治',liquidity:'流动性',
      hype_risk:'炒作风险',accounting_quality:'会计质量',cyclicality:'周期性',alternative_design_risk:'替代方案'
    };
    if (ser.dimensions) {
      dimsHTML = '<div style="margin-top:8px;font-size:10px;font-weight:600;color:var(--sub)">正向维度</div>';
      Object.entries(ser.dimensions.positive||{}).forEach(([k,v])=>{
        const pct = (v/5*100)+'%';
        const barColor = v>=4?'#34c759':v>=3?'#007aff':v>=2?'#ff9500':'#d2d2d7';
        dimsHTML += `<div style="display:flex;align-items:center;gap:6px;margin:2px 0">
          <span style="width:60px;font-size:10px;text-align:right;color:var(--sub)">${dimNames[k]||k}</span>
          <div style="flex:1;height:4px;border-radius:2px;background:rgba(0,0,0,0.06);overflow:hidden">
            <div style="width:${pct};height:100%;border-radius:2px;background:${barColor}"></div>
          </div>
          <span style="font-size:10px;width:12px;text-align:center;font-weight:600;color:${barColor}">${v}</span>
        </div>`;
      });
      dimsHTML += '<div style="margin-top:8px;font-size:10px;font-weight:600;color:var(--sub)">风险因子</div>';
      Object.entries(ser.dimensions.penalties||{}).forEach(([k,v])=>{
        if (v === 0) return;
        const pct = (v/5*100)+'%';
        const barColor = v>=4?'#ff3b30':v>=3?'#ff9500':'#d2d2d7';
        dimsHTML += `<div style="display:flex;align-items:center;gap:6px;margin:2px 0">
          <span style="width:60px;font-size:10px;text-align:right;color:var(--sub)">${penNames[k]||k}</span>
          <div style="flex:1;height:4px;border-radius:2px;background:rgba(0,0,0,0.06);overflow:hidden">
            <div style="width:${pct};height:100%;border-radius:2px;background:${barColor}"></div>
          </div>
          <span style="font-size:10px;width:12px;text-align:center;font-weight:600;color:${barColor}">${v}</span>
        </div>`;
      });
    }

    // Analysis section
    let analysisHTML = '';
    if (ser.analysis) {
      const a = ser.analysis;
      analysisHTML = `<div style="margin-top:8px;font-size:10px;font-weight:600;color:var(--sub)">产业链分析</div>`;
      if (a.chain_position) analysisHTML += `<div style="font-size:11px;color:var(--sub);margin:2px 0 6px">${a.chain_position}</div>`;
      if (a.competitive_moat) analysisHTML += `<div style="font-size:11px;padding:6px 8px;background:rgba(52,199,89,0.06);border-radius:8px;margin:4px 0">🏰 ${a.competitive_moat}</div>`;
      if (a.demand_driver) analysisHTML += `<div style="font-size:11px;padding:6px 8px;background:rgba(0,122,255,0.05);border-radius:8px;margin:4px 0">📈 ${a.demand_driver}</div>`;
      if (a.risk_factors && a.risk_factors.length) {
        analysisHTML += `<div style="font-size:11px;font-weight:600;color:var(--sub);margin:8px 0 4px">⚠️ 风险因素</div>`;
        a.risk_factors.forEach(rf => {
          analysisHTML += `<div style="font-size:11px;padding:3px 8px;margin:2px 0;border-left:2px solid var(--red);color:var(--sub)">${rf}</div>`;
        });
      }
      if (a.catalyst) analysisHTML += `<div style="font-size:11px;padding:6px 8px;background:rgba(255,149,0,0.06);border-radius:8px;margin:4px 0">⚡ ${a.catalyst}</div>`;
      if (a.valuation_note) analysisHTML += `<div style="font-size:11px;padding:6px 8px;background:rgba(94,92,230,0.05);border-radius:8px;margin:4px 0">💎 ${a.valuation_note}</div>`;
    }

    serenityHTML = `
    <div class="serenity-section">
      <h4>&#128300; 瓶颈分析</h4>
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
        <span class="serenity-score-num" style="color:${scColor}">${ser.score}</span>
        <span class="serenity-verdict" style="color:${scColor}">${(ser.verdict||sl)}</span>
      </div>
      <div class="serenity-score-bar">
        <div class="serenity-score-fill" style="width:${ser.score}%;background:linear-gradient(90deg,#ff3b30,#ff9500,#34c759,#007aff)"></div>
      </div>
      ${dimsHTML}
      ${analysisHTML}
      ${ser.summary ? `<div class="serenity-summary">${ser.summary}</div>` : ''}
      ${ser.flags && ser.flags.length ? `<div class="serenity-flags">${ser.flags.map(f=>`<span class="serenity-flag">${f}</span>`).join('')}</div>` : ''}
    </div>`;
  }

  document.getElementById('sheet').innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div><div class="sheet-title">${s.name}</div><div class="sheet-code">${s.code}</div></div>
      <button class="sheet-close" onclick="closeSheet()">&#10005;</button>
    </div>
    <div class="sheet-ratio ${cls}">${s.ratio.toFixed(1)}x</div>
    <div style="font-size:11px;color:var(--sub)">PE(TTM) / 动态市盈率 比值</div>
    <div class="sheet-grid">
      <div class="sheet-item"><div class="l">现价</div><div class="v">¥${s.price}</div></div>
      <div class="sheet-item"><div class="l">PE(TTM)</div><div class="v">${formatPE(s.peTTM)}</div></div>
      <div class="sheet-item"><div class="l">动态市盈率</div><div class="v">${formatPE(s.peDyn)}</div></div>
      <div class="sheet-item"><div class="l">AI概念</div><div class="v" style="font-size:14px">${s.isAiConcept ? '&#9989; 是' : '&#10060; 否'}</div></div>
    </div>
    <div class="card-tags" style="margin-top:10px">${(s.sectors||[]).map(b =>
      `<span class="tag${isAiSector(b)?' tag-ai':''}">${b}</span>`
    ).join('')}</div>
    ${serenityHTML}
    <div style="margin-top:16px;padding:12px;background:rgba(0,113,227,0.04);border-radius:12px;font-size:11px;color:var(--primary);line-height:1.6">
      &#128161; PE(TTM) &gt; 动态PE &rarr; TTM估值高于基于最新季报年化的动态估值，反映最新季度盈利相对TTM出现改善。
    </div>
  `;
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

// ════════════════════ ACTIONS ════════════════════
function shareApp() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({title:'AI PE Screener',text:'AI板块 PE/动态PE 筛选工具',url});
  } else {
    navigator.clipboard.writeText(url).then(()=>toast('链接已复制'));
  }
}

function exportData() {
  const data = filterData();
  if (!data.length) { toast('暂无数据'); return; }
  const csv = '代码,名称,现价,PE_TTM,动态PE,比值,AI概念,板块\n' +
    data.map(s => `${s.code},${s.name},${s.price},${s.peTTM},${s.peDyn},${s.ratio},${s.isAiConcept?'是':'否'},${(s.sectors||[]).join('/')}`).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'AI_PE_Screener.csv'; a.click();
  toast('CSV 已下载');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// ════════════════════ INIT ════════════════════
loadData(false);
</script>
