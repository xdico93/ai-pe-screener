<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI PE筛选器</title>
<style>
:root {
  --primary: #1e3a5f; --accent: #3b82f6; --bg: #f0f4f8;
  --card: #fff; --text: #1e293b; --sub: #64748b; --border: #e2e8f0;
  --green: #16a34a; --blue: #2563eb; --amber: #d97706;
  --red: #ef4444; --radius: 12px; --safe-bottom: env(safe-area-inset-bottom, 16px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg); color: var(--text); line-height:1.5;
  -webkit-font-smoothing: antialiased; max-width: 480px; margin:0 auto;
  min-height: 100vh; padding-bottom: calc(60px + var(--safe-bottom));
}
/* header */
.header {
  position: sticky; top:0; z-index:100;
  background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
  color:#fff; padding:12px 16px; padding-top: max(12px, env(safe-area-inset-top));
}
.header-row { display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:17px; font-weight:700; }
.header .sub { font-size:11px; opacity:.75; margin-top:2px; }
.header .uptime { font-size:10px; opacity:.6; margin-top:1px; }
.header .actions { display:flex; gap:8px; }
.btn-icon {
  width:32px;height:32px;border-radius:50%;border:none;
  background:rgba(255,255,255,.15);color:#fff;font-size:16px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
/* stats bar */
.stats-bar {
  display:flex; gap:8px; padding:12px 16px; overflow-x:auto;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.stats-bar::-webkit-scrollbar { display:none; }
.stat-chip {
  flex-shrink:0; background:var(--card); border-radius:20px;
  padding:6px 14px; font-size:12px; color:var(--sub);
  box-shadow:0 1px 3px rgba(0,0,0,.06); cursor:pointer;
  transition: all .2s; white-space:nowrap;
}
.stat-chip .n { font-weight:700; color:var(--primary); font-size:15px; }
.stat-chip.active { background:var(--primary); color:#fff; }
.stat-chip.active .n { color:#fff; }
/* search */
.search-wrap { padding:0 16px 10px; }
.search-box {
  display:flex; align-items:center; background:var(--card);
  border-radius:24px; padding:10px 16px; gap:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.search-box input {
  flex:1; border:none; outline:none; font-size:14px; background:transparent;
  color:var(--text);
}
.search-box input::placeholder { color:#94a3b8; }
/* card list */
.list { padding:0 12px; }
.card {
  background:var(--card); border-radius:var(--radius); margin-bottom:10px;
  padding:14px; box-shadow:0 1px 3px rgba(0,0,0,.06);
  cursor:pointer; transition:transform .15s; position:relative;
  overflow:hidden;
}
.card:active { transform:scale(.98); }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.card-code { font-size:13px; color:var(--sub); }
.card-name { font-size:16px; font-weight:700; }
.card-ratio {
  font-size:22px; font-weight:800; text-align:right;
}
.ratio-high { color:var(--green); }
.ratio-mid { color:var(--blue); }
.ratio-low { color:var(--amber); }
.card-metrics {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;
  padding:10px 0; border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.metric-label { font-size:10px; color:var(--sub); margin-bottom:2px; }
.metric-value { font-size:14px; font-weight:600; }
.card-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:10px; }
.tag {
  font-size:10px; padding:2px 8px; border-radius:10px;
  background:#e0e7ff; color:#3730a3; white-space:nowrap;
}
/* loading */
.loading {
  text-align:center; padding:60px 20px; color:var(--sub);
}
.spinner {
  width:36px; height:36px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin .8s linear infinite; margin:0 auto 16px;
}
@keyframes spin { to { transform:rotate(360deg); } }
/* empty state */
.empty {
  text-align:center; padding:60px 20px; color:var(--sub);
}
.empty .icon { font-size:48px; margin-bottom:12px; }
/* detail sheet */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200;
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.overlay.show { opacity:1; pointer-events:auto; }
.sheet {
  background:#fff; border-radius:20px 20px 0 0; width:100%; max-width:480px;
  max-height:85vh; overflow-y:auto; padding:20px; padding-bottom:calc(20px + var(--safe-bottom));
  transform:translateY(100%); transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.overlay.show .sheet { transform:translateY(0); }
.sheet-handle { width:36px; height:4px; background:#cbd5e1; border-radius:2px; margin:0 auto 16px; }
.sheet-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
.sheet-title { font-size:20px; font-weight:700; }
.sheet-code { font-size:13px; color:var(--sub); }
.sheet-close { font-size:24px; background:none; border:none; cursor:pointer; color:var(--sub); padding:4px; }
.sheet-ratio { font-size:36px; font-weight:800; margin:16px 0; }
.sheet-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:16px 0; }
.sheet-item { background:#f8fafc; border-radius:10px; padding:12px; }
.sheet-item .l { font-size:11px; color:var(--sub); }
.sheet-item .v { font-size:18px; font-weight:700; margin-top:4px; }
/* filter chips */
.filter-wrap { padding:12px 16px; display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.filter-chip {
  flex-shrink:0; padding:6px 14px; border-radius:18px; font-size:12px;
  border:1px solid var(--border); background:var(--card); cursor:pointer;
  transition:all .2s; white-space:nowrap;
}
.filter-chip.on { background:var(--accent); color:#fff; border-color:var(--accent); }
/* toast */
.toast {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(0,0,0,.8); color:#fff; padding:10px 24px; border-radius:20px;
  font-size:14px; z-index:999; opacity:0; pointer-events:none; transition:opacity .3s;
}
.toast.show { opacity:1; }
/* footer */
.footer-bar {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px; background:var(--card);
  border-top:1px solid var(--border); display:flex;
  padding:8px 16px; padding-bottom:calc(8px + var(--safe-bottom));
  gap:12px; z-index:100;
}
.footer-btn {
  flex:1; padding:8px; border:none; border-radius:10px;
  font-size:13px; font-weight:600; cursor:pointer; transition:opacity .2s;
}
.footer-btn:active { opacity:.7; }
.footer-btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-outline { background:transparent; color:var(--primary); border:1.5px solid var(--primary); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-row">
    <div>
      <h1>🤖 AI PE筛选器</h1>
      <div class="sub">PE(TTM)/动态PE &gt; 1.5</div>
      <div class="uptime" id="updateTime">加载中...</div>
    </div>
    <div class="actions">
      <button class="btn-icon" onclick="shareApp()" title="分享">📤</button>
      <button class="btn-icon" onclick="toggleFilters()" title="筛选">🔍</button>
    </div>
  </div>
</div>

<!-- Stats Bar -->
<div class="stats-bar" id="statsBar"></div>

<!-- Search -->
<div class="search-wrap">
  <div class="search-box">
    <span style="font-size:14px">🔎</span>
    <input type="text" id="searchInput" placeholder="搜索代码或名称..." oninput="doSearch()">
    <span id="searchCount" style="font-size:12px;color:var(--sub);display:none"></span>
  </div>
</div>

<!-- Filter Chips -->
<div class="filter-wrap" id="filterWrap"></div>

<!-- Card List -->
<div class="list" id="cardList"></div>

<!-- Loading -->
<div class="loading" id="loadingView">
  <div class="spinner"></div>
  <div>正在加载数据...</div>
</div>

<!-- Empty State -->
<div class="empty" id="emptyState" style="display:none">
  <div class="icon">📭</div>
  <div>没有符合条件的标的</div>
</div>

<!-- Detail Sheet -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Footer -->
<div class="footer-bar">
  <button class="footer-btn btn-outline" onclick="exportData()">📋 导出数据</button>
  <button class="footer-btn btn-primary" id="btnRefresh" onclick="loadData(true)">🔄 更新数据</button>
</div>

<script>
// ══════════════════════════════════════════════
// Dynamic data loader — fetches data.json
// ══════════════════════════════════════════════
const DATA_URL = 'https://xdico93.github.io/ai-pe-screener/data.json';
const CACHE_KEY = 'aipescreener_data';
const CACHE_TIME_KEY = 'aipescreener_ts';

let STOCK_DATA = [];
let ALL_BOARDS = [];
let dataMeta = null;

async function loadData(forceRefresh) {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  btn.textContent = '⏳ 更新中...';

  // Show loading if no cache
  if (!STOCK_DATA.length) {
    document.getElementById('loadingView').style.display = 'block';
    document.getElementById('cardList').innerHTML = '';
  }

  try {
    let url = DATA_URL;
    if (forceRefresh) {
      url += '?t=' + Date.now();
      // Clear cache first
      localStorage.removeItem(CACHE_KEY);
      localStorage.removeItem(CACHE_TIME_KEY);
    }

    const resp = await fetch(url, { cache: forceRefresh ? 'no-cache' : 'default' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const json = await resp.json();
    if (!json.data || !Array.isArray(json.data)) throw new Error('Invalid data format');

    STOCK_DATA = json.data;
    dataMeta = { updated: json.updated || '', count: json.count || json.data.length };
    ALL_BOARDS = [...new Set(STOCK_DATA.flatMap(s => s.boards))].sort();

    // Cache in localStorage
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify(json));
      localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
    } catch(e) { /* quota exceeded, ignore */ }

    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('updateTime').textContent =
      dataMeta.updated ? '上次更新: ' + dataMeta.updated : '已加载最新数据';
    btn.textContent = forceRefresh ? '✅ 已更新' : '🔄 更新数据';
    toast(forceRefresh ? '数据已更新 (' + dataMeta.count + '条)' : '已加载 ' + dataMeta.count + ' 条');

    // Reset filters
    activeBoard = null;
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    render();
  } catch(err) {
    console.error('Load failed:', err);
    // Try cached fallback
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      try {
        const json = JSON.parse(cached);
        STOCK_DATA = json.data;
        dataMeta = { updated: json.updated || '', count: json.count };
        ALL_BOARDS = [...new Set(STOCK_DATA.flatMap(s => s.boards))].sort();
        document.getElementById('loadingView').style.display = 'none';
        document.getElementById('updateTime').textContent =
          '缓存数据 · ' + (dataMeta.updated || '离线模式');
        toast('⚠️ 网络异常，使用本地缓存');
        render();
      } catch(e2) {
        showEmpty('数据加载失败，请检查网络后重试');
      }
    } else {
      showEmpty('数据加载失败，请检查网络后重试');
    }
    btn.textContent = '🔄 更新数据';
  }
  btn.disabled = false;
  if (btn.textContent === '✅ 已更新') {
    setTimeout(() => { if (btn.textContent === '✅ 已更新') btn.textContent = '🔄 更新数据'; }, 3000);
  }
}

function showEmpty(msg) {
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('emptyState').style.display = 'block';
  document.getElementById('emptyState').innerHTML = '<div class="icon">⚠️</div><div>' + msg + '</div>';
  document.getElementById('updateTime').textContent = '连接失败';
}

// ════════════════════════ STATE ════════════════════════
let activeBoard = null;
let searchQuery = '';
let sortKey = 'ratio';
let sortAsc = false;

// ════════════════════════ RENDER ════════════════════════
function filterData() {
  if (!STOCK_DATA.length) return [];
  return STOCK_DATA.filter(s => {
    if (activeBoard && !s.boards.includes(activeBoard)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!s.code.includes(q) && !s.name.toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a,b) => {
    const va = a[sortKey], vb = b[sortKey];
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? va - vb : vb - va;
  });
}

function ratioClass(r) {
  if (r >= 5) return 'ratio-high';
  if (r >= 2) return 'ratio-mid';
  return 'ratio-low';
}

function formatPE(v) {
  if (v >= 1000) return (v/1000).toFixed(1)+'k';
  return v.toFixed(1);
}

function render() {
  const data = filterData();
  // Stats
  const byBoard = {};
  ALL_BOARDS.forEach(b => { byBoard[b] = data.filter(s => s.boards.includes(b)).length; });
  let chipsHTML = `<div class="stat-chip${!activeBoard ? ' active' : ''}" onclick="setBoard(null)"><div class="n">${data.length}</div>全部</div>`;
  Object.entries(byBoard).filter(([_,c]) => c > 0).forEach(([b,c]) => {
    chipsHTML += `<div class="stat-chip${activeBoard === b ? ' active' : ''}" onclick="setBoard('${b}')"><div class="n">${c}</div>${b}</div>`;
  });
  document.getElementById('statsBar').innerHTML = chipsHTML;
  // Filter chips
  let fHTML = `<div class="filter-chip${sortKey === 'ratio' ? ' on' : ''}" onclick="setSort('ratio')">📊 比值</div>`;
  fHTML += `<div class="filter-chip${sortKey === 'peTTM' ? ' on' : ''}" onclick="setSort('peTTM')">📈 PE(TTM)</div>`;
  fHTML += `<div class="filter-chip${sortKey === 'peDyn' ? ' on' : ''}" onclick="setSort('peDyn')">📉 动态PE</div>`;
  fHTML += `<div class="filter-chip${sortKey === 'code' ? ' on' : ''}" onclick="setSort('code')">🔢 代码</div>`;
  document.getElementById('filterWrap').innerHTML = fHTML;
  // Cards
  if (data.length === 0) {
    document.getElementById('cardList').innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
  } else {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('cardList').innerHTML = data.map(s => `
      <div class="card" onclick="openDetail('${s.code}')">
        <div class="card-top">
          <div>
            <div class="card-code">${s.code}</div>
            <div class="card-name">${s.name}</div>
          </div>
          <div class="card-ratio ${ratioClass(s.ratio)}">${s.ratio.toFixed(1)}x</div>
        </div>
        <div class="card-metrics">
          <div><div class="metric-label">现价</div><div class="metric-value">¥${s.price}</div></div>
          <div><div class="metric-label">PE(TTM)</div><div class="metric-value">${formatPE(s.peTTM)}</div></div>
          <div><div class="metric-label">动态PE</div><div class="metric-value">${formatPE(s.peDyn)}</div></div>
        </div>
        <div class="card-tags">${s.boards.map(b => `<span class="tag">${b}</span>`).join('')}</div>
      </div>
    `).join('');
  }
  document.getElementById('searchCount').style.display = searchQuery ? 'inline' : 'none';
  if (searchQuery) document.getElementById('searchCount').textContent = `${data.length}条`;
}

function setBoard(b) { activeBoard = b; render(); }
function setSort(k) {
  if (sortKey === k) { sortAsc = !sortAsc; } else { sortKey = k; sortAsc = (k === 'code'); }
  render();
}
function doSearch() {
  searchQuery = document.getElementById('searchInput').value.trim();
  render();
}
function toggleFilters() { document.getElementById('searchInput').focus(); }

// ════════════════════ DETAIL SHEET ════════════════════
function openDetail(code) {
  const s = STOCK_DATA.find(x => x.code === code);
  if (!s) return;
  const cls = ratioClass(s.ratio);
  document.getElementById('sheet').innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div><div class="sheet-title">${s.name}</div><div class="sheet-code">${s.code}</div></div>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-ratio ${cls}">${s.ratio.toFixed(1)}x</div>
    <div style="font-size:12px;color:var(--sub)">PE(TTM) / 动态市盈率 比值</div>
    <div class="sheet-grid">
      <div class="sheet-item"><div class="l">现价</div><div class="v">¥${s.price}</div></div>
      <div class="sheet-item"><div class="l">PE(TTM)</div><div class="v">${formatPE(s.peTTM)}</div></div>
      <div class="sheet-item"><div class="l">动态市盈率</div><div class="v">${formatPE(s.peDyn)}</div></div>
      <div class="sheet-item"><div class="l">所属板块</div><div class="v" style="font-size:13px">${s.boards.join(' / ')}</div></div>
    </div>
    <div class="card-tags" style="margin-top:12px">${s.boards.map(b => `<span class="tag">${b}</span>`).join('')}</div>
    <div style="margin-top:20px;padding:12px;background:#fffbeb;border-radius:10px;font-size:12px;color:#92400e">
      💡 PE(TTM) > 动态PE × 1.5 → TTM估值高于基于最新季报年化的动态估值，反映最近季度盈利相较TTM出现改善。
    </div>
  `;
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

// ════════════════════ ACTIONS ════════════════════
function shareApp() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({title:'AI PE筛选器',text:'AI板块 PE(TTM)/动态PE > 1.5 筛选结果',url});
  } else {
    navigator.clipboard.writeText(url).then(() => toast('链接已复制，可分享给好友'));
  }
}
function exportData() {
  const data = filterData();
  if (!data.length) { toast('暂无数据可导出'); return; }
  const csv = '代码,名称,现价,PE_TTM,动态PE,比值,板块\n' +
    data.map(s => `${s.code},${s.name},${s.price},${s.peTTM},${s.peDyn},${s.ratio},${s.boards.join('/')}`).join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'AI_PE_Screener.csv'; a.click();
  toast('CSV已下载');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ════════════════════ INIT ════════════════════
loadData(false);
</script>
</body>
</html>
